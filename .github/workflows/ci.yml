name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  api-tests:
    name: API Tests (JDK 21)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run API tests
        run: mvn -B -pl api-tests -am clean test
        continue-on-error: true

      - name: Upload API allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: 'api-tests/target/allure-results/'
          retention-days: 7

  ui-tests:
    name: UI Tests (Selenium Grid)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      selenium-hub:
        image: selenium/hub:4.27.0
        ports:
          - 4442:4442
          - 4443:4443
          - 4444:4444

      chrome-node:
        image: selenium/node-chrome:4.27.0
        env:
          SE_EVENT_BUS_HOST: selenium-hub
          SE_EVENT_BUS_PUBLISH_PORT: 4442
          SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
        options: --shm-size=2gb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Wait for Grid
        run: |
          echo "Waiting for Selenium Grid..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4444/wd/hub/status | grep -q '"ready":true'; then
              echo "Grid is ready!"
              break
            fi
            echo "  attempt $i — not ready yet"
            sleep 2
          done

      - name: Run UI tests
        run: mvn -B -pl ui-tests -am clean test -Dselenium.grid.url=http://localhost:4444/wd/hub
        continue-on-error: true

      - name: Upload UI allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-ui
          path: 'ui-tests/target/allure-results/'
          retention-days: 7

  allure-report:
    name: Allure Report → GitHub Pages
    needs: [api-tests, ui-tests]
    if: always() && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download API results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-api
          path: allure-results/
        continue-on-error: true

      - name: Download UI results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-ui
          path: allure-results/
        continue-on-error: true

      - name: Load Allure history
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Restore history
        run: |
          if [ -d gh-pages/history ]; then
            cp -r gh-pages/history allure-results/history
          fi

      - name: Install Allure CLI
        run: |
          curl -sL -o allure.tgz https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -xzf allure.tgz
          chmod +x allure-2.29.0/bin/allure
          echo "$PWD/allure-2.29.0/bin" >> $GITHUB_PATH

      - name: Verify Allure
        run: allure --version

      - name: Generate Allure report
        run: allure